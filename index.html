<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Form</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">

        <!-- ================= Progress ================= -->

        <div class="progress-container">
        
            <div class="progress-line">
                <div class="progress-fill" id="progressFill"></div>
            </div>
        
            <div class="steps">
        
                <a class="step active" href="#personal" data-section="personal">
                    <div class="circle">1</div>
                    <span>Personal</span>
                </a>
        
                <a class="step" href="#contact" data-section="contact">
                    <div class="circle">2</div>
                    <span>Contact</span>
                </a>
        
                <a class="step" href="#venue" data-section="venue">
                    <div class="circle">3</div>
                    <span>Venue</span>
                </a>
        
                <a class="step" href="#done" data-section="done">
                    <div class="circle">4</div>
                    <span>Done</span>
                </a>
        
            </div>
        
        </div>

            <!-- ===================================================== -->
            <!-- PERSONAL INFORMATION -->
            <!-- ===================================================== -->

            <form class="form-section" id="personal" action="#contact">

                <h1>Personal Information</h1>
                <hr>

                <div class="row">
                    <label>First Name *</label>
                    <input type="text" required>
                </div>

                <div class="row">
                    <label>Surname *</label>
                    <input type="text" required>
                </div>

                <div class="row">
                    <label>Do you have a South African ID? *</label>

                    <div class="inline">
                        <label><input type="radio" name="id"> Yes</label>
                        <label><input type="radio" name="id"> No</label>
                    </div>
                </div>

                <div class="row">
                    <label>South African ID</label>
                    <input type="text">
                </div>

                <div class="row">
                    <label>Date of Birth *</label>
                    <input type="date" required>
                </div>

                <div class="row">
                    <label>Gender</label>

                    <div class="inline">
                        <label><input type="radio" name="gender"> Male</label>
                        <label><input type="radio" name="gender"> Female</label>
                    </div>
                </div>

                <div class="row">
                    <label>Email Address *</label>
                    <input type="email" placeholder="example@gmail.com" required>
                </div>

                <div class="row">
                    <label>Mobile Number</label>
                    <input type="text" placeholder="+27123456789">
                </div>

                <div class="row">
                    <label>Special Needs</label>
                    <input type="checkbox">
                </div>

                <div class="row">
                    <label>Password *</label>
                    <input type="password" placeholder="Enter your password" required>
                    <div class="password-hint">Password must contain letters, special characters, and numbers.</div>
                </div>

                <div class="row">
                    <label>Confirm Password *</label>
                    <input type="password" required>
                </div>

                <div class="buttons">
                    <button type="submit" class="btn continue">Next</button>
                </div>

            </form>

            <!-- ===================================================== -->
            <!-- CONTACT INFORMATION -->
            <!-- ===================================================== -->

            <form class="form-section" id="contact" action="#venue">

                <h1>Contact Information</h1>
                <hr>

                <div class="row">
                    <label>Home Number</label>
                    <input type="text">
                </div>

                <div class="row">
                    <label>Residential Address *</label>
                    <textarea rows="4" required></textarea>
                </div>

                <div class="row">
                    <label>Suburb</label>
                    <input type="text">
                </div>

                <div class="row">
                    <label>City / Town *</label>
                    <input type="text" required>
                </div>

                <div class="row">
                    <label>Province / Region *</label>

                    <select required>
                        <option>Select Province</option>
                        <option>Eastern Cape</option>
                        <option>Free State</option>
                        <option>Gauteng</option>
                        <option>KwaZulu-Natal</option>
                        <option>Limpopo</option>
                        <option>Mpumalanga</option>
                        <option>North West</option>
                        <option>Northern Cape</option>
                        <option>Western Cape</option>
                    </select>
                </div>

                <div class="row">
                    <label>Postal Code *</label>
                    <input type="text" required>
                </div>

                <div class="row">
                    <label>Country</label>

                    <select>
                        <option>South Africa</option>
                    </select>
                </div>

                <div class="row">
                    <label>Institution Applying To *</label>

                    <select required>
                        <option>Select Institution</option>
                        <option>University of Pretoria</option>
                        <option>University of Johannesburg</option>
                        <option>North-West University</option>
                        <option>University of Cape Town</option>
                        <option>University of the Free State</option>
                        <option>University of KwaZulu-Natal</option>
                    </select>
                </div>

                <div class="buttons">
                    <a class="btn" href="#personal">Back</a>
                    <button type="submit" class="btn continue">Next</button>
                </div>

            </form>

            <!-- ===================================================== -->
            <!-- TEST / VENUE SELECTION -->
            <!-- ===================================================== -->

            <form class="form-section" id="venue" action="#done">

                <h1>Test / Venue Selection</h1>
                <hr>

                <div class="row">
                    <label>Do you want to write the Mathematics Test? *</label>

                    <div class="inline">
                        <label><input type="radio" name="math"> Yes</label>
                        <label><input type="radio" name="math"> No</label>
                    </div>
                </div>

                <div class="row">
                    <label>Language *</label>

                    <div class="inline">
                        <label><input type="radio" name="language"> English</label>
                        <label><input type="radio" name="language"> Afrikaans</label>
                    </div>
                </div>

                <div class="row">
                    <label>Region *</label>

                    <select required>
                        <option>-Select-</option>
                        <option>@NBT Online</option>
                        <option>Eastern Cape</option>
                        <option>Free State</option>
                        <option>Gauteng</option>
                        <option>KwaZulu-Natal</option>
                        <option>Limpopo</option>
                        <option>Mpumalanga</option>
                        <option>North West</option>
                        <option>Northern Cape</option>
                        <option>Western Cape</option>
                    </select>
                </div>

                <h2>Agreements</h2>

                <div class="checkbox-group">

                    <label>
                        <input type="checkbox">
                        I agree that registration for the NBT test is specific to the selected venue and date, and I am
                        responsible for paying the required test fee.
                    </label>

                    <label>
                        <input type="checkbox">
                        NBT fees are non-refundable even if I do not write the test.
                    </label>

                    <label>
                        <input type="checkbox">
                        The NBT Project may release my scores only to institutions of higher learning.
                    </label>

                    <label>
                        <input type="checkbox">
                        The NBT Project may use my results for research purposes while maintaining confidentiality.
                    </label>

                </div>

                <div class="buttons">
                    <a class="btn" href="#contact">Back</a>
                    <button type="submit" class="btn continue">Next</button>
                </div>

            </form>

            <!-- ===================================================== -->
            <!-- DONE -->
            <!-- ===================================================== -->

            <form class="form-section" id="done">

                <h1>Finish Registration</h1>
                <hr>

                <div class="buttons">
                    <a class="btn" href="#venue">Back</a>
                    <button type="reset" class="btn">Clear Form</button>
                    <button type="submit" class="btn continue">Submit Registration</button>
                </div>

            </form>

    </div>

</body>

</html>
